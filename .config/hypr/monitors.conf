# -----------------------------------------------------
# Monitors Configuration
# -----------------------------------------------------

# Monitor principal (HDMI) - posición izquierda
# El monitor reporta 1920x1080@75Hz como modo máximo disponible
monitor = HDMI-A-1, 1920x1080@74.97, 0x0, 1

# Monitor secundario (laptop) - diagonal al HDMI (esquina a esquina)
# Toca solo el punto (1920,1080) - el cursor no puede cruzar accidentalmente
monitor = eDP-1, preferred, 1920x1080, 1.25

# Si solo tienes un monitor, usa:
# monitor = , preferred, auto, 1
