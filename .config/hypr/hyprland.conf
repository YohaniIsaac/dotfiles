# -----------------------------------------------------
# Minimal Hyprland Configuration
# -----------------------------------------------------

# Monitor
source = ~/.config/hypr/monitors.conf

# Cursor
source = ~/.config/hypr/cursor.conf

# Environment
source = ~/.config/hypr/environment.conf

# Keyboard
source = ~/.config/hypr/keyboard.conf

# Load color file
source = ~/.config/hypr/colors.conf

# -----------------------------------------------------
# Autostart
# -----------------------------------------------------
source = ~/.config/hypr/autostart.conf

# -----------------------------------------------------
# Load configuration files
# -----------------------------------------------------
source = ~/.config/hypr/window.conf
source = ~/.config/hypr/decoration.conf
source = ~/.config/hypr/layout.conf
source = ~/.config/hypr/workspace.conf
source = ~/.config/hypr/misc.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf

# -----------------------------------------------------
# Animation
# -----------------------------------------------------
source = ~/.config/hypr/animation.conf

# -----------------------------------------------------
# DBus for xdg-desktop-portal-hyprland
# -----------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# -----------------------------------------------------
# Custom Configuration
# -----------------------------------------------------
source = ~/.config/hypr/custom.conf
