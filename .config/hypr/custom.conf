# -----------------------------------------------------
# Custom Configuration
# -----------------------------------------------------

# ----- Unbind default workspace keybinds -----
unbind = $mainMod, 1
unbind = $mainMod, 2
unbind = $mainMod, 3
unbind = $mainMod, 4
unbind = $mainMod, 5
unbind = $mainMod, 6
unbind = $mainMod, 7
unbind = $mainMod, 8
unbind = $mainMod, 9
unbind = $mainMod, 0
unbind = $mainMod SHIFT, 1
unbind = $mainMod SHIFT, 2
unbind = $mainMod SHIFT, 3
unbind = $mainMod SHIFT, 4
unbind = $mainMod SHIFT, 5
unbind = $mainMod SHIFT, 6
unbind = $mainMod SHIFT, 7
unbind = $mainMod SHIFT, 8
unbind = $mainMod SHIFT, 9
unbind = $mainMod SHIFT, 0
unbind = $mainMod, Tab
unbind = $mainMod SHIFT, Tab

# ----- Workspaces independientes por monitor -----
# El script detecta el monitor activo y navega al workspace correcto:
#   DP-1     → workspaces 1-10  (primario / ASUS)
#   HDMI-A-1 → workspaces 11-20 (secundario / SAC)
#   eDP-1    → workspaces 21-30 (auxiliar / laptop)
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/workspace-nav.sh goto 10

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/workspace-nav.sh move 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/workspace-nav.sh move 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/workspace-nav.sh move 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/workspace-nav.sh move 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/workspace-nav.sh move 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/workspace-nav.sh move 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/workspace-nav.sh move 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/workspace-nav.sh move 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/workspace-nav.sh move 9
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/workspace-nav.sh move 10

# ----- Toggle entre monitores principales -----
bind = $mainMod, Tab, exec, ~/.config/hypr/scripts/toggle-main-monitors.sh

# ----- Switch entre monitores (F1=ASUS, F2=SAC, F3=laptop) -----
bind = $mainMod, F1, focusmonitor, DP-1
bind = $mainMod, F2, focusmonitor, HDMI-A-1
bind = $mainMod, F3, focusmonitor, eDP-1

bind = $mainMod SHIFT, F1, movewindow, mon:DP-1
bind = $mainMod SHIFT, F2, movewindow, mon:HDMI-A-1
bind = $mainMod SHIFT, F3, movewindow, mon:eDP-1
