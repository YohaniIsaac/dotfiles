general {
    ignore_empty_input = true
    hide_cursor = true
    grace = 5
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(89b4faee)
    inner_color = rgba(1e1e2eee)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = Password...
    hide_input = false
    rounding = 10
    position = 0, -50
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(cdd6f4ee)
    font_size = 72
    font_family = JetBrains Mono
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = Hello, $USER
    color = rgba(cdd6f4cc)
    font_size = 20
    font_family = JetBrains Mono
    position = 0, 50
    halign = center
    valign = center
}
