# -----------------------------------------------------
# Keybindings Configuration
# -----------------------------------------------------

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi

# Applications
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, B, exec, brave-browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, pkill rofi || rofi -show drun -theme ~/.config/rofi/config.rasi -modi drun,filebrowser,run,window
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaperSelect.sh

# Reparar workspaces (útil tras matugen u otros reloads)
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/init-workspaces.sh

# Display
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}")
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1

# Windows
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, T, togglefloating
bind = $mainMod SHIFT, T, workspaceopt, allfloat
bind = $mainMod, J, togglesplit
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Window resize
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

# Cycle windows
binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop

# Actions
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod SHIFT, A, exec, ~/.config/hypr/scripts/toggle-animations.sh
bind = , Print, exec, grim ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png
bind = $mainMod, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png
bind = $mainMod CTRL, Q, exec, wlogout
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, L, exec, hyprlock
bind = $mainMod CTRL, L, exec, hyprlock
bind = CTRL, Tab, exec, wofi --show window

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Workspaces (se sobreescribe en custom.conf para hyprsplit)
